name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

    - name: Download NCNN Android Vulkan
      run: |
        cd app/src/main/jni
        NCNN_VERSION="20240410"
        wget -q "https://github.com/Tencent/ncnn/releases/download/${NCNN_VERSION}/ncnn-${NCNN_VERSION}-android-vulkan.zip"
        unzip -q "ncnn-${NCNN_VERSION}-android-vulkan.zip"
        mv "ncnn-${NCNN_VERSION}-android-vulkan" ncnn-android-vulkan
        rm "ncnn-${NCNN_VERSION}-android-vulkan.zip"
        echo "NCNN directory contents:"
        ls -la ncnn-android-vulkan/
        ls -la ncnn-android-vulkan/arm64-v8a/lib/

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/26.1.10909125" >> local.properties
        cat local.properties

    - name: Setup Gradle wrapper
      run: |
        # Generate proper gradle wrapper
        GRADLE_VER="8.4"
        wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        /tmp/gradle-${GRADLE_VER}/bin/gradle wrapper --gradle-version ${GRADLE_VER} --no-configuration-cache -p /tmp/empty_proj 2>/dev/null || true
        # Just copy the wrapper jar from the gradle distribution
        mkdir -p gradle/wrapper
        cp /tmp/gradle-${GRADLE_VER}/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
        # If that didn't work, download it directly
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VER}/gradle/wrapper/gradle-wrapper.jar" -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
        fi
        # Create a proper gradlew
        cat > gradlew << 'GWEOF'
#!/bin/sh
APP_HOME=$(cd "$(dirname "$0")" && pwd -P)
CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
JAVACMD=java
if [ -n "$JAVA_HOME" ]; then JAVACMD="$JAVA_HOME/bin/java"; fi
exec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
GWEOF
        chmod +x gradlew
        # Verify
        ls -la gradle/wrapper/
        rm -rf /tmp/gradle*

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
