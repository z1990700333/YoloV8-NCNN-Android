name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

    - name: Download NCNN Android Vulkan
      run: |
        cd app/src/main/jni
        NCNN_VERSION="20240410"
        wget -q "https://github.com/Tencent/ncnn/releases/download/${NCNN_VERSION}/ncnn-${NCNN_VERSION}-android-vulkan.zip"
        unzip -q "ncnn-${NCNN_VERSION}-android-vulkan.zip"
        mv "ncnn-${NCNN_VERSION}-android-vulkan" ncnn-android-vulkan
        rm "ncnn-${NCNN_VERSION}-android-vulkan.zip"
        ls -la ncnn-android-vulkan/
        ls -la ncnn-android-vulkan/arm64-v8a/lib/

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/26.1.10909125" >> local.properties

    - name: Setup Gradle wrapper
      run: |
        GRADLE_VER="8.4"
        wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        mkdir -p gradle/wrapper
        cp /tmp/gradle-${GRADLE_VER}/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Wrapper jar not found in lib, trying subprojects..."
          find /tmp/gradle-${GRADLE_VER} -name "gradle-wrapper*.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
        fi
        printf '#!/bin/sh\nAPP_HOME=$(cd "$(dirname "$0")" && pwd -P)\nCLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar\nJAVACMD=java\nif [ -n "$JAVA_HOME" ]; then JAVACMD="$JAVA_HOME/bin/java"; fi\nexec "$JAVACMD" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
        chmod +x gradlew
        ls -la gradle/wrapper/
        rm -rf /tmp/gradle*

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
